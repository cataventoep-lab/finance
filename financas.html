<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Mensais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F5F2;
    --surface:#FFFFFF;
    --ink:#152820;
    --ink-soft:#5A6E64;
    --line:#DCE5DF;
    --verde:#1E7A56;
    --verde-soft:#E3F2EA;
    --vermelho:#C2452D;
    --vermelho-soft:#F9E9E5;
    --ouro:#B98A2F;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    font-size:15px;
    min-height:100vh;
  }
  .num{font-variant-numeric:tabular-nums}
  header{
    background:var(--ink);
    color:#F1F5F2;
    padding:20px 24px 0;
  }
  .header-inner{max-width:1060px;margin:0 auto}
  .brand{
    font-family:'Archivo',sans-serif;
    font-stretch:110%;
    font-weight:800;
    font-size:20px;
    letter-spacing:-0.02em;
    display:flex;align-items:center;gap:10px;
  }
  .brand span{color:#7FD6AC}
  .month-nav{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:18px;padding-bottom:16px;
  }
  .month-name{
    font-family:'Archivo',sans-serif;
    font-stretch:105%;
    font-weight:700;font-size:30px;letter-spacing:-0.02em;
    text-transform:capitalize;
  }
  .month-nav button{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    color:#F1F5F2;width:40px;height:40px;border-radius:10px;
    font-size:18px;cursor:pointer;transition:background .15s;
  }
  .month-nav button:hover{background:rgba(255,255,255,.18)}
  .month-nav button:focus-visible{outline:2px solid #7FD6AC;outline-offset:2px}
  main{max-width:1060px;margin:0 auto;padding:24px 24px 60px}

  /* resumo */
  .resumo{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:14px}
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px 20px;
  }
  .card .label{
    font-size:12px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-soft);
  }
  .card .valor{
    font-family:'Archivo',sans-serif;font-weight:700;
    font-size:26px;margin-top:6px;letter-spacing:-0.01em;
  }
  .card.entradas .valor{color:var(--verde)}
  .card.saidas .valor{color:var(--vermelho)}
  .card.saldo{
    background:var(--ink);color:#F1F5F2;border-color:var(--ink);
    position:relative;overflow:hidden;
  }
  .card.saldo .label{color:#9DB3A8}
  .card.saldo .valor{font-size:32px}
  .card.saldo .valor.neg{color:#F1A08C}
  .card.saldo .valor.pos{color:#7FD6AC}
  .pagas-info{font-size:12px;color:var(--ink-soft);margin-top:6px}
  .barra-pagas{
    height:6px;background:var(--line);border-radius:3px;margin-top:8px;overflow:hidden;
  }
  .barra-pagas div{height:100%;background:var(--verde);border-radius:3px;transition:width .3s}

  /* layout principal */
  .grid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-top:14px;align-items:start}

  h2{
    font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;
    letter-spacing:-0.01em;margin-bottom:12px;
    display:flex;align-items:center;justify-content:space-between;
  }
  h2 .tag{
    font-family:'Inter';font-size:11px;font-weight:600;color:var(--ink-soft);
    background:var(--bg);border:1px solid var(--line);
    padding:3px 8px;border-radius:20px;
  }

  /* lista de lançamentos */
  .lista{display:flex;flex-direction:column;gap:6px}
  .item{
    display:flex;align-items:center;gap:12px;
    padding:10px 12px;border-radius:10px;
    border:1px solid var(--line);background:#FDFEFD;
    transition:opacity .2s;
  }
  .item.pago{opacity:.55}
  .item.pago .desc{text-decoration:line-through}
  .check{
    width:22px;height:22px;min-width:22px;border-radius:7px;
    border:2px solid var(--line);background:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;color:#fff;transition:all .15s;
  }
  .check.on{background:var(--verde);border-color:var(--verde)}
  .check:focus-visible{outline:2px solid var(--verde);outline-offset:2px}
  .item .info{flex:1;min-width:0}
  .item .desc{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .venc{font-size:12px;color:var(--ink-soft)}
  .item .valor-item{font-family:'Archivo',sans-serif;font-weight:700;font-size:15px}
  .item.tipo-entrada .valor-item{color:var(--verde)}
  .item.tipo-saida .valor-item{color:var(--vermelho)}
  .del{
    background:none;border:none;color:var(--ink-soft);cursor:pointer;
    font-size:15px;padding:4px 6px;border-radius:6px;opacity:.5;
  }
  .del:hover{opacity:1;background:var(--vermelho-soft);color:var(--vermelho)}
  .vazio{
    text-align:center;color:var(--ink-soft);padding:30px 10px;font-size:14px;
    border:1px dashed var(--line);border-radius:10px;
  }

  /* formulário */
  form{display:flex;flex-direction:column;gap:10px}
  .tipo-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tipo-toggle button{
    padding:10px;border-radius:10px;border:1px solid var(--line);
    background:#fff;font-weight:600;font-size:14px;cursor:pointer;
    font-family:'Inter';color:var(--ink-soft);transition:all .15s;
  }
  .tipo-toggle button.sel-entrada{background:var(--verde-soft);border-color:var(--verde);color:var(--verde)}
  .tipo-toggle button.sel-saida{background:var(--vermelho-soft);border-color:var(--vermelho);color:var(--vermelho)}
  label{font-size:12px;font-weight:600;color:var(--ink-soft)}
  input{
    width:100%;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;font-family:'Inter';
    background:#fff;color:var(--ink);margin-top:4px;
  }
  input:focus{outline:2px solid var(--verde);outline-offset:0;border-color:var(--verde)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn-add{
    margin-top:4px;padding:12px;border:none;border-radius:10px;
    background:var(--ink);color:#fff;font-weight:600;font-size:15px;
    font-family:'Inter';cursor:pointer;transition:background .15s;
  }
  .btn-add:hover{background:#254536}
  .btn-repetir{
    margin-top:8px;padding:10px;border:1px solid var(--line);border-radius:10px;
    background:#fff;color:var(--ink-soft);font-size:13px;font-weight:500;
    font-family:'Inter';cursor:pointer;
  }
  .btn-repetir:hover{border-color:var(--ink-soft);color:var(--ink)}

  /* gráficos */
  .chart-box{position:relative;height:210px;margin-top:4px}
  .chart-ano{position:relative;height:230px}
  .card + .card{margin-top:14px}

  .status-save{
    font-size:11px;color:var(--ink-soft);text-align:right;margin-top:10px;
  }

  @media (max-width:820px){
    .resumo{grid-template-columns:1fr 1fr}
    .card.saldo{grid-column:1/-1}
    .grid{grid-template-columns:1fr}
    .month-name{font-size:24px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">FINANÇAS <span>MENSAIS</span></div>
    <div class="month-nav">
      <button id="mesAnterior" aria-label="Mês anterior">‹</button>
      <div class="month-name num" id="mesNome"></div>
      <button id="mesProximo" aria-label="Próximo mês">›</button>
    </div>
  </div>
</header>

<main>
  <section class="resumo">
    <div class="card entradas">
      <div class="label">Total entradas</div>
      <div class="valor num" id="totEntradas">R$ 0,00</div>
    </div>
    <div class="card saidas">
      <div class="label">Total saídas</div>
      <div class="valor num" id="totSaidas">R$ 0,00</div>
      <div class="pagas-info" id="pagasInfo"></div>
      <div class="barra-pagas"><div id="barraPagas" style="width:0%"></div></div>
    </div>
    <div class="card saldo">
      <div class="label">Saldo líquido do mês</div>
      <div class="valor num" id="saldo">R$ 0,00</div>
    </div>
  </section>

  <div class="grid">
    <div>
      <div class="card">
        <h2>Lançamentos <span class="tag" id="qtdLanc">0 itens</span></h2>
        <div class="lista" id="lista"></div>
      </div>
      <div class="card">
        <h2>Visão do ano</h2>
        <div class="chart-ano"><canvas id="chartAno"></canvas></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Novo lançamento</h2>
        <form id="formAdd">
          <div class="tipo-toggle">
            <button type="button" id="btnEntrada">↑ Entrada</button>
            <button type="button" id="btnSaida" class="sel-saida">↓ Saída</button>
          </div>
          <div>
            <label for="descInput">Descrição</label>
            <input id="descInput" placeholder="Ex.: Aluguel, Salário..." required>
          </div>
          <div class="row2">
            <div>
              <label for="valorInput">Valor (R$)</label>
              <input id="valorInput" type="number" step="0.01" min="0.01" placeholder="0,00" required>
            </div>
            <div>
              <label for="diaInput">Dia venc. (opcional)</label>
              <input id="diaInput" type="number" min="1" max="31" placeholder="Ex.: 15">
            </div>
          </div>
          <button class="btn-add" type="submit">Adicionar</button>
          <button class="btn-repetir" type="button" id="btnRepetir">Copiar lançamentos do mês anterior</button>
        </form>
      </div>
      <div class="card">
        <h2>Entradas × Saídas</h2>
        <div class="chart-box"><canvas id="chartMes"></canvas></div>
      </div>
      <div class="status-save" id="statusSave"></div>
    </div>
  </div>
</main>

<script>
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const fmt = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const hoje = new Date();
let mesAtual = { ano: hoje.getFullYear(), mes: hoje.getMonth() };
let dados = {}; // { "2026-06": [ {id, tipo, desc, valor, dia, pago} ] }
let tipoSel = 'saida';
let temStorage = true;

const chaveMes = m => m.ano + '-' + String(m.mes+1).padStart(2,'0');

// ---- dados iniciais (baseados na sua planilha) ----
function dadosIniciais(){
  const k = chaveMes(mesAtual);
  const mk = (tipo,desc,valor,dia) => ({ id: Math.random().toString(36).slice(2), tipo, desc, valor, dia: dia||null, pago:false });
  return { [k]: [
    mk('entrada','Salário Thiago',4230,5),
    mk('entrada','Salário Fê',3000,5),
    mk('saida','Dízimo Thi',498.03,5),
    mk('saida','Oferta Thi',498.03,5),
    mk('saida','Dízimo Fê',300,5),
    mk('saida','Oferta Fê',180,5),
    mk('saida','Aluguel',1453.24,15),
    mk('saida','Internet',99.90,10),
    mk('saida','Luz',158.19,5),
    mk('saida','Água',130.37,17),
    mk('saida','Carro',698.07,14),
    mk('saida','MEI Thiago',86.05,20),
    mk('saida','Empréstimo',602,11),
    mk('saida','Gasolina',250,11),
  ]};
}

// ---- persistência ----
async function salvar(){
  if(!temStorage){ setStatus('Dados apenas nesta sessão'); return; }
  try{
    await window.storage.set('financas-dados', JSON.stringify(dados));
    setStatus('Salvo automaticamente ✓');
  }catch(e){
    temStorage = false;
    setStatus('Dados apenas nesta sessão');
  }
}
async function carregar(){
  try{
    const r = await window.storage.get('financas-dados');
    if(r && r.value){ dados = JSON.parse(r.value); return; }
  }catch(e){ /* chave não existe ainda ou sem storage */ }
  dados = dadosIniciais();
  salvar();
}
function setStatus(t){ document.getElementById('statusSave').textContent = t; }

// ---- lógica ----
const lancamentos = () => dados[chaveMes(mesAtual)] || [];

function totais(lista){
  const e = lista.filter(l=>l.tipo==='entrada').reduce((s,l)=>s+l.valor,0);
  const s = lista.filter(l=>l.tipo==='saida').reduce((a,l)=>a+l.valor,0);
  return { entradas:e, saidas:s, saldo:e-s };
}

function render(){
  const lista = lancamentos().slice().sort((a,b)=>(a.dia||99)-(b.dia||99));
  const t = totais(lista);

  document.getElementById('mesNome').textContent = MESES[mesAtual.mes]+' '+mesAtual.ano;
  document.getElementById('totEntradas').textContent = fmt(t.entradas);
  document.getElementById('totSaidas').textContent = fmt(t.saidas);
  const saldoEl = document.getElementById('saldo');
  saldoEl.textContent = fmt(t.saldo);
  saldoEl.className = 'valor num ' + (t.saldo>=0?'pos':'neg');

  const saidas = lista.filter(l=>l.tipo==='saida');
  const pagas = saidas.filter(l=>l.pago).length;
  document.getElementById('pagasInfo').textContent =
    saidas.length ? pagas+' de '+saidas.length+' contas pagas' : 'Nenhuma conta neste mês';
  document.getElementById('barraPagas').style.width =
    saidas.length ? (pagas/saidas.length*100)+'%' : '0%';
  document.getElementById('qtdLanc').textContent = lista.length + (lista.length===1?' item':' itens');

  const ul = document.getElementById('lista');
  ul.innerHTML = '';
  if(!lista.length){
    ul.innerHTML = '<div class="vazio">Nenhum lançamento neste mês.<br>Adicione uma entrada ou saída ao lado.</div>';
  }
  lista.forEach(l=>{
    const div = document.createElement('div');
    div.className = 'item tipo-'+l.tipo+(l.pago?' pago':'');
    const rotulo = l.tipo==='saida' ? 'pago' : 'recebido';
    div.innerHTML = `
      <button class="check ${l.pago?'on':''}" title="Marcar como ${rotulo}" aria-label="Marcar ${l.desc} como ${rotulo}">${l.pago?'✓':''}</button>
      <div class="info">
        <div class="desc">${l.desc}</div>
        <div class="venc">${l.dia?'Dia '+String(l.dia).padStart(2,'0'):'Sem vencimento'} · ${l.tipo==='entrada'?'Entrada':'Saída'}</div>
      </div>
      <div class="valor-item num">${l.tipo==='entrada'?'+':'−'} ${fmt(l.valor)}</div>
      <button class="del" title="Excluir" aria-label="Excluir ${l.desc}">✕</button>`;
    div.querySelector('.check').onclick = ()=>{ l.pago = !l.pago; salvar(); render(); };
    div.querySelector('.del').onclick = ()=>{
      const k = chaveMes(mesAtual);
      dados[k] = dados[k].filter(x=>x.id!==l.id);
      salvar(); render();
    };
    ul.appendChild(div);
  });

  desenharCharts(t);
}

// ---- gráficos ----
let chartMes=null, chartAno=null;
function desenharCharts(t){
  const ctx1 = document.getElementById('chartMes');
  if(chartMes) chartMes.destroy();
  chartMes = new Chart(ctx1,{
    type:'doughnut',
    data:{
      labels:['Entradas','Saídas'],
      datasets:[{ data:[t.entradas, t.saidas], backgroundColor:['#1E7A56','#C2452D'], borderWidth:0 }]
    },
    options:{
      cutout:'62%', maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom', labels:{font:{family:'Inter',size:12}}},
        tooltip:{callbacks:{label:c=>' '+fmt(c.parsed)}} }
    }
  });

  const ano = mesAtual.ano;
  const ent=[], sai=[];
  for(let m=0;m<12;m++){
    const l = dados[ano+'-'+String(m+1).padStart(2,'0')] || [];
    const tt = totais(l);
    ent.push(tt.entradas); sai.push(tt.saidas);
  }
  const ctx2 = document.getElementById('chartAno');
  if(chartAno) chartAno.destroy();
  chartAno = new Chart(ctx2,{
    type:'bar',
    data:{
      labels:MESES.map(m=>m.slice(0,3)),
      datasets:[
        {label:'Entradas', data:ent, backgroundColor:'#1E7A56', borderRadius:4},
        {label:'Saídas', data:sai, backgroundColor:'#C2452D', borderRadius:4}
      ]
    },
    options:{
      maintainAspectRatio:false,
      scales:{
        y:{ticks:{callback:v=>'R$ '+(v/1000)+'k',font:{family:'Inter',size:11}},grid:{color:'#E7EEE9'}},
        x:{grid:{display:false},ticks:{font:{family:'Inter',size:11}}}
      },
      plugins:{ legend:{position:'bottom',labels:{font:{family:'Inter',size:12}}},
        tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+fmt(c.parsed.y)}} }
    }
  });
}

// ---- eventos ----
document.getElementById('mesAnterior').onclick = ()=>{
  mesAtual.mes--; if(mesAtual.mes<0){mesAtual.mes=11;mesAtual.ano--;} render();
};
document.getElementById('mesProximo').onclick = ()=>{
  mesAtual.mes++; if(mesAtual.mes>11){mesAtual.mes=0;mesAtual.ano++;} render();
};

const bE = document.getElementById('btnEntrada'), bS = document.getElementById('btnSaida');
bE.onclick = ()=>{ tipoSel='entrada'; bE.className='sel-entrada'; bS.className=''; };
bS.onclick = ()=>{ tipoSel='saida'; bS.className='sel-saida'; bE.className=''; };

document.getElementById('formAdd').onsubmit = e=>{
  e.preventDefault();
  const desc = document.getElementById('descInput').value.trim();
  const valor = parseFloat(document.getElementById('valorInput').value);
  const dia = parseInt(document.getElementById('diaInput').value) || null;
  if(!desc || !valor || valor<=0) return;
  const k = chaveMes(mesAtual);
  if(!dados[k]) dados[k]=[];
  dados[k].push({ id: Math.random().toString(36).slice(2), tipo:tipoSel, desc, valor, dia, pago:false });
  e.target.reset();
  salvar(); render();
  document.getElementById('descInput').focus();
};

document.getElementById('btnRepetir').onclick = ()=>{
  let m = mesAtual.mes-1, a = mesAtual.ano;
  if(m<0){m=11;a--;}
  const anterior = dados[a+'-'+String(m+1).padStart(2,'0')];
  if(!anterior || !anterior.length){ alert('O mês anterior não tem lançamentos.'); return; }
  const k = chaveMes(mesAtual);
  if(!dados[k]) dados[k]=[];
  anterior.forEach(l=>{
    dados[k].push({ ...l, id: Math.random().toString(36).slice(2), pago:false });
  });
  salvar(); render();
};

// ---- init ----
(async ()=>{
  if(typeof window.storage === 'undefined'){ temStorage=false; dados = dadosIniciais(); }
  else await carregar();
  render();
})();
</script>
</body>
</html>
